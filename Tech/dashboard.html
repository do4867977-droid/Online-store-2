<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  overflow-x:hidden;
}

/* luces rave */
body::after{
  content:'';
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle, red 0%, transparent 40%);
  animation:moveLights 6s infinite linear;
  opacity:0.15;
}

@keyframes moveLights{
  0%{transform:translate(-20%,-20%)}
  50%{transform:translate(20%,20%)}
  100%{transform:translate(-20%,-20%)}
}

header{
  padding:20px;
  background:#000;
  border-bottom:2px solid red;
  display:flex;
  justify-content:space-between;
}

.product{
  max-width:600px;
  margin:50px auto;
  background:#111;
  padding:20px;
  border:1px solid red;
  text-align:center;
  box-shadow:0 0 30px red;
}

video{
  width:100%;
  border:2px solid red;
}

button{
  padding:12px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
  margin-top:10px;
  width:100%;
}

.preview-btn{
  background:#222;
  border:1px solid red;
}

.preview-btn:hover{
  background:#330000;
}

form{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input,textarea{
  padding:10px;
  background:#000;
  border:1px solid red;
  color:white;
}
</style>
</head>

<body>

<header>
  <h2>DASHBOARD</h2>
  <button onclick="logout()">Logout</button>
</header>

<div class="product">
  <h2>TECHNO TRACK</h2>

  <video src="techno2.mp4" autoplay muted loop></video>

  <p>Price: 1000 EUR</p>

  <!-- 🔥 BOTÓN PREVIEW -->
  <button class="preview-btn" onclick="goPreview()">👁 Ver Preview</button>

  <!-- 🔥 BOTÓN COMPRA -->
  <button onclick="buy()">💳 BUY</button>

  <!-- FORM -->
  <form id="contactForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <textarea id="message" placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCP2W3s6kvDvlREql-8VSwK65nKx_Enn5k",
  authDomain: "project-8155574477096226340.firebaseapp.com",
  projectId: "project-8155574477096226340"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* login obligatorio */
if(!localStorage.getItem("user")){
  window.location.href="index.html";
}

/* ir a preview */
window.goPreview = function(){
  window.location.href = "preview.html";
};

/* compra */
window.buy = async function(){
  const user = JSON.parse(localStorage.getItem("user"));

  await addDoc(collection(db,"purchases"),{
    product:"techno2.mp4",
    price:1000,
    user:user.email,
    date:new Date()
  });

  window.open("https://checkout.wompi.co/l/VPOS_LBTnN9");
};

/* logout */
window.logout = function(){
  localStorage.removeItem("user");
  window.location.href="index.html";
};

/* EMAILJS */
emailjs.init("vX0t-GXtKalnU0ZY1");

document.getElementById("contactForm").addEventListener("submit", async e=>{
  e.preventDefault();

  const name=document.getElementById("name").value;
  const email=document.getElementById("email").value;
  const message=document.getElementById("message").value;

  await addDoc(collection(db,"contacts"),{
    name,email,message,date:new Date()
  });

  await emailjs.send("service_kxheek8","template_ihmxb2o",{
    user_name:name,
    user_email:email,
    message:message
  });

  alert("Mensaje enviado 🚀");
});
</script>

</body>
</html>
