* {

}

body {

  padding: 0;

}

#backgroundVideo {

  z-index: -1;

}

header {

  box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
}

header h1 {

  color: #ff0000;
  text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000;
  letter-spacing: 2px;
  animation: glow 2s ease-in-out infinite alternate;
}

header p {
  font-size: 0.9em;
  opacity: 0.9;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.cart-icon {
  font-size: 1.5em;
  cursor: pointer;
  position: relative;
}

.cart-count {
  position: absolute;
  top: -8px;
  right: -8px;
  background: #ff0000;
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8em;
  font-weight: bold;
}

#loginBtn {
  padding: 12px 25px;

  background-size: 200% 200%;

  color: white;
  border: 2px solid white;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  font-size: 1em;

}

#loginBtn:hover {
  background: #ff4444;
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
}

.youtube-btn {
  padding: 12px 20px;
  background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
  color: white;
  border: 2px solid white;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  font-size: 1em;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.youtube-btn:hover {
  background: linear-gradient(135deg, #ff4444 0%, #ff0000 100%);
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
}

.section-title {
  font-size: 2em;
  margin: 40px 20px 30px;
  border-bottom: 3px solid #cc0000;
  padding-bottom: 15px;
  text-align: center;
  letter-spacing: 1px;
  color: #ff4444;
  text-shadow: 0 0 10px #ff4444;
  animation: glow 3s ease-in-out infinite alternate;
}

#tracksContainer {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

@media (max-width: 768px) {
  #tracksContainer {
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 10px;
  }
  
  .track {
    padding: 15px;
  }
  
  .track-video {
    height: 150px;
  }
  
  header h1 {
    font-size: 2em;
  }
  
  .header-top {
    flex-direction: column;
    text-align: center;
  }
  
  .cart-icon {
    margin-top: 10px;
  }
}

@media (max-width: 480px) {
  #tracksContainer {
    grid-template-columns: 1fr;
  }
  
  .track-video {
    height: 120px;
  }
  
  .play-icon {
    font-size: 2em;
  }
}

.track {
  background: linear-gradient(135deg, #000000 0%, #330000 50%, #000000 100%);
  background-size: 200% 200%;
  animation: gradientShift 5s ease infinite;
  border: 2px solid #ff0000;
  border-radius: 12px;
  padding: 25px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  animation: slideIn 0.5s ease-out;
}

.track::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255, 0, 0, 0.1);
  transition: left 0.3s ease;
}

.track:hover {
  border-color: #ff4444;
  box-shadow: 0 0 30px rgba(255, 0, 0, 0.8), inset 0 0 30px rgba(255, 0, 0, 0.2);
  transform: translateY(-10px) scale(1.02);
  animation: pulse 1s ease-in-out infinite;
}

.track:hover::before {
  left: 100%;
}

.track h3 {
  color: #ff4444;
  margin-bottom: 12px;
  font-size: 1.4em;
  position: relative;
  z-index: 1;
}

.track-video {
  width: 100%;
  height: 200px;
  background: #000;
  border-radius: 8px;
  margin-bottom: 15px;
  position: relative;
  overflow: hidden;
  z-index: 1;
  cursor: pointer;
}

.track-video video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
  display: none;
}

.thumb {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
}

.thumb-1 {
  clip-path: inset(0 50% 0 0);
}

.thumb-2 {
  clip-path: inset(0 0 0 50%);
}

.play-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3em;
  color: #ff0000;
  cursor: pointer;
  z-index: 3;
  transition: all 0.3s ease;
  text-shadow: 0 0 10px #ff0000;
}

.track:hover .play-icon {
  color: #ffffff;
  text-shadow: 0 0 20px #ffffff, 0 0 30px #ff0000;
  animation: glow 1s ease-in-out infinite alternate;
}

audio {
  display: none;
}

.track-info {
  font-size: 0.9em;

  margin-bottom: 15px;

.price {

.track button:hover {

.track button:active {

.contact-section {

input, textarea {

input:focus, textarea:focus {

  50% { background-position: 100% 50%; }

@keyframes glow {

@keyframes slideIn {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

const analytics = getAnalytics(app);

console.log("Storage:", storage);

let isGoogleLoggedIn = false;
let cartCount = 0;

function setBuyButtonsState(enabled) {
  document.querySelectorAll('#tracksContainer button').forEach(btn => {
    btn.disabled = !enabled;
    btn.textContent = enabled ? '🛒 Add to Cart' : '🔒 Login to Buy';
  });
}

auth.onAuthStateChanged((user) => {
  if (user) {
    isGoogleLoggedIn = true;
    setBuyButtonsState(true);
    document.getElementById("loginBtn").textContent = `✅ ${user.displayName}`;
    renderTracks(); // Re-render to show all tracks
    // Redirect to dashboard
    window.location.href = 'dashboard.html';
  } else {
    isGoogleLoggedIn = false;
    setBuyButtonsState(false);
    document.getElementById("loginBtn").textContent = "🔐 Login with Google";
    renderTracks(); // Re-render to show preview tracks
  }
});

// LOGIN GOOGLE
const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").onclick = async () => {
  try {
    if (isGoogleLoggedIn) {
      await signOut(auth);
      return;
    }

    const result = await signInWithPopup(auth, provider);
    const user = result.user;

};

// 🔐 2FA
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
  size: 'normal'
});

async function enable2FA(user) {
  const phone = prompt("Enter phone +573... (optional for 2FA)");
  if(phone) {
    const provider = new PhoneAuthProvider(auth);

    const verificationId = await provider.verifyPhoneNumber({
      phoneNumber: phone,
      session: await multiFactor(user).getSession()
    }, window.recaptchaVerifier);

    const code = prompt("Enter SMS code");

    const cred = PhoneAuthProvider.credential(verificationId, code);

    await multiFactor(user).enroll(cred, "phone");

    alert("2FA activated 🔐");
  }
}


// � TRACKS CON VIDEOS (01 a 21)
const tracks = [];
let tracksLoaded = false;

async function loadTracksFromFirestore() {
  try {
    console.log("Loading tracks from Firestore...");
    const tracksCollection = collection(db, 'tracks');
    const tracksSnapshot = await getDocs(tracksCollection);
    
    if (tracksSnapshot.empty) {
      console.log("No tracks found in Firestore, initializing...");
      // Si no hay tracks en Firestore, inicializar con datos locales
      await initializeTracksInFirestore();
      return loadTracksFromFirestore(); // Recargar después de inicializar
    }
    
    tracks.length = 0; // Limpiar array
    tracksSnapshot.forEach((doc) => {
      tracks.push({ id: doc.id, ...doc.data() });
    });
    
    // Sort tracks by name
    tracks.sort((a, b) => a.name.localeCompare(b.name));
    
    console.log(`Loaded ${tracks.length} tracks from Firestore`);
    tracksLoaded = true;
    renderTracks();
  } catch (error) {
    console.error("Error loading tracks from Firestore:", error);
    // Fallback a tracks locales si hay error
    console.log("Falling back to local tracks...");
    initializeLocalTracks();
    renderTracks();
  }
}

async function initializeTracksInFirestore() {
  const tracksCollection = collection(db, 'tracks');
  
  for (let i = 1; i <= 21; i++) {
    const trackData = {
      name: `Track ${i.toString().padStart(2, '0')}`,
      video: `track ${i.toString().padStart(2, '0')}.mp4`,
      price: 1000,
      thumbnail: i % 2 === 0 ? "2.jpeg" : "1.jpeg",
      createdAt: new Date()
    };
    
    await addDoc(tracksCollection, trackData);
  }
}

function initializeLocalTracks() {
  tracks.length = 0;
  for (let i = 1; i <= 21; i++) {
    tracks.push({
      name: `Track ${i.toString().padStart(2, '0')}`,
      video: `track ${i.toString().padStart(2, '0')}.mp4`,
      price: 1000,
      thumbnail: i % 2 === 0 ? "2.jpeg" : "1.jpeg"
    });
  }
  // Sort tracks by name
  tracks.sort((a, b) => a.name.localeCompare(b.name));
}

function renderTracks() {
  const container = document.getElementById("tracksContainer");
  container.innerHTML = ''; // Limpiar contenedor
  
  let tracksToShow;
  if (isGoogleLoggedIn) {
    tracksToShow = tracks;
  } else {
    tracksToShow = tracks.slice(6, 7).concat(tracks.slice(11, 12));
  }
  
  tracksToShow.forEach((track, index) => {
    const div = document.createElement("div");
    div.className = "track";

    const thumbSrc = track.thumbnail || (index % 2 === 0 ? "1.jpeg" : "2.jpeg");

    div.innerHTML = `
      <div class="track-video" onclick="togglePlay(${index})">
        <img class="thumb thumb-1" src="${thumbSrc}" alt="${track.name} Thumb 1">
        <img class="thumb thumb-2" src="${thumbSrc}" alt="${track.name} Thumb 2">
        <video id="video-${index}" src="${track.video}" loop preload="none"></video>
        <span class="play-icon">▶</span>
      </div>
      <h3>${track.name}</h3>
      <div class="price">$${track.price || 1000}</div>
      <button id="buyBtn-${index}" onclick="buyTrack('${track.name}', '${track.price || 1000}')" disabled>🔒 Login to Buy</button>
    `;

    container.appendChild(div);
  });

  setBuyButtonsState(isGoogleLoggedIn);
  
  // Re-inicializar event listeners para videos
  initializeVideoEventListeners();
}

function initializeVideoEventListeners() {
  tracks.forEach((track, index) => {
    const video = document.getElementById(`video-${index}`);
    if (video) {
      const thumb1 = document.querySelector(`#tracksContainer .track:nth-child(${index + 1}) .thumb-1`);
      const thumb2 = document.querySelector(`#tracksContainer .track:nth-child(${index + 1}) .thumb-2`);
      const icon = document.querySelector(`#tracksContainer .track:nth-child(${index + 1}) .play-icon`);
      
      video.addEventListener('ended', () => {
        video.style.display = 'none';
        if (thumb1) thumb1.style.display = 'block';
        if (thumb2) thumb2.style.display = 'block';
        if (icon) icon.textContent = '▶';
      });
    }
  });
}

// Función para alternar reproducción
window.togglePlay = function(index) {
  // Pausar todos los videos antes de proceder
  tracks.forEach((_, i) => {
    const v = document.getElementById(`video-${i}`);
    if (v && !v.paused) {
      v.pause();
      const trackElement = document.querySelector(`#tracksContainer .track:nth-child(${i + 1})`);
      const thumb1 = trackElement.querySelector('.thumb-1');
      const thumb2 = trackElement.querySelector('.thumb-2');
      const icon = trackElement.querySelector('.play-icon');
      v.style.display = 'none';
      thumb1.style.display = 'block';
      thumb2.style.display = 'block';
      icon.textContent = '▶';
    }
  });

  const video = document.getElementById(`video-${index}`);
  const trackElement = document.querySelector(`#tracksContainer .track:nth-child(${index + 1})`);
  const thumb1 = trackElement.querySelector('.thumb-1');
  const thumb2 = trackElement.querySelector('.thumb-2');
  const icon = trackElement.querySelector('.play-icon');
  
  if (video.style.display === 'none' || video.style.display === '') {
    thumb1.style.display = 'none';
    thumb2.style.display = 'none';
    video.style.display = 'block';
    video.play();
    icon.textContent = '⏸';
  } else {
    if (video.paused) {
      video.play();
      icon.textContent = '⏸';
    } else {
      video.pause();
      icon.textContent = '▶';
      thumb1.style.display = 'block';
      thumb2.style.display = 'block';
    }
  }
};

initializeLocalTracks();

// 💳 CARRITO & WOMPI
window.buyTrack = async function(trackName, price) {
  if (!isGoogleLoggedIn) {
    alert('Por favor inicia sesión con Google antes de comprar.');
    return;
  }

  try {
    // Guardar la compra en Firestore
    const priceValue = parseInt(price.toString().replace('$', '').replace(',', ''));
    const purchaseData = {
      trackName: trackName,
      price: priceValue,
      userId: auth.currentUser.uid,
      userEmail: auth.currentUser.email,
      userName: auth.currentUser.displayName,
      purchaseDate: new Date(),
      status: 'pending'
    };

    const docRef = await addDoc(collection(db, 'purchases'), purchaseData);
    console.log('Purchase saved with ID:', docRef.id);

    cartCount++;
    document.getElementById("cartCount").textContent = cartCount;
    
    // Animación
    const cartIcon = document.querySelector(".cart-icon");
    cartIcon.style.transform = "scale(1.3)";
    setTimeout(() => {

    alert(`¡Compra registrada! ${trackName} - $${price}`);
    window.open("https://checkout.wompi.co/l/VPOS_LBTnN9", "_blank");

    alert("Error al procesar la compra. Inténtalo de nuevo. Error: " + error.message);

};
