<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* NAVBAR */
.navbar{
  width:100%;
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  background:#0a0a0a;
  border-bottom:1px solid red;
  box-shadow:0 0 10px red;
  flex-wrap:wrap;
  z-index:3;
}

.navbar a{
  text-decoration:none;
}

.navbar button{
  background:#111;
  color:white;
  border:1px solid red;
  padding:10px 15px;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

.navbar button:hover{
  background:red;
  box-shadow:0 0 10px red, 0 0 20px red;
}

/* fondo glitch */
body::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(45deg,#ff0000,#000,#444);
  mix-blend-mode:overlay;
  animation:glitchBg 3s infinite;
  opacity:0.2;
  z-index:0;
}

@keyframes glitchBg{
  0%{transform:translate(0)}
  20%{transform:translate(-5px,5px)}
  40%{transform:translate(5px,-5px)}
  60%{transform:translate(-5px,0)}
  80%{transform:translate(5px,5px)}
  100%{transform:translate(0)}
}

/* CONTENEDOR LOGIN */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  background:#111;
  padding:40px;
  border:1px solid red;
  text-align:center;
  z-index:2;
  box-shadow:0 0 15px red;
  width:90%;
  max-width:350px;
}

h1{
  color:red;
  letter-spacing:3px;
}

.login-btn{
  padding:15px 25px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
  font-weight:bold;
  margin-top:20px;
  width:100%;
  transition:0.3s;
}

.login-btn:hover{
  box-shadow:0 0 10px red, 0 0 20px red;
}

/* RESPONSIVE */
@media(max-width:500px){
  .navbar{
    gap:10px;
    padding:10px;
  }

  .navbar button{
    padding:8px 10px;
    font-size:12px;
  }

  .container{
    padding:25px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="https://www.instagram.com/jd_co09?igsh=MTZ5OWFpMmJkY3RzNQ==" target="_blank">
    <button>Instagram</button>
  </a>

  <a href="https://youtube.com/@jd_co?si=ztnPcHBTJnrr19tN" target="_blank">
    <button>YouTube</button>
  </a>

  <a href="https://github.com/do4867977-droid" target="_blank">
    <button>GitHub</button>
  </a>

  <a href="https://wa.me/573225140412" target="_blank">
    <button>WhatsApp</button>
  </a>
</div>

<!-- LOGIN -->
<div class="main">
  <div class="container">
    <h1>LOG IN</h1>
    <button class="login-btn" id="loginBtn">Login with Google</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCP2W3s6kvDvlREql-8VSwK65nKx_Enn5k",
  authDomain: "project-8155574477096226340.firebaseapp.com",
  projectId: "project-8155574477096226340",
  storageBucket: "project-8155574477096226340.firebasestorage.app",
  messagingSenderId: "309038596135",
  appId: "1:309038596135:web:661020e20e905d60ab0e02"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").onclick = async () => {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  localStorage.setItem("user", JSON.stringify(result.user));
  window.location.href = "dashboard.html";
};
</script>

</body>
</html>
